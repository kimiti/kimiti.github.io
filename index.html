<html>

<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>alumni registration form</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" type="text/css" media="screen" href="css/main.css" />
  
</head>

<body>
  <div class="title">
    <h1>alumni registration</h1>
  </div>
  <div class="container">
    <div class="left"> </div>
    <div class="right">
      <div class="formBox">
        <form>
          <p>First Name</p>
          <input type="text" name="" placeholder="First Name">
          <p>Last Name</p>
          <input type="text" name="" placeholder="Last Name">
          <p>Email</p>
          <input type="text" name="" placeholder="Email">
          <p>Year Of Admin</p>
          <input type="text" name="" placeholder="Year Of Admin">
          <p>Sports</p>
          <input type="text" name="" placeholder="Sports">
          <p>Hobbies</p>
          <input type="password" name="" placeholder="Hobbies">
          <input class="Btnnext" type="button" name="" value="NEXT">
          <!-- <a href="#">forget password</a> -->
        </form>
      </div>
    </div>

    <div class="right-right">
        <div class="formBox">
          <form>
            <p>Marital Status</p>
          <input type="text" name="" placeholder="Marital Status">
          <p>Position</p>
          <input type="text" name="" placeholder="Position">
          <p>Residence</p>
          <input type="text" name="" placeholder="Residence">
          <p>Organisation</p>
          <input type="text" name="" placeholder="Organisation">
          <p>Awards</p>
          <input type="text" name="" placeholder="Awards">
          <p>Scholarships</p>
          <input type="password" name="" placeholder="Scholarships">
          <input class="Btnprev" type="button" name="" value="Back">
          <input class="Btnnext" type="button"  type="submit" name="" value="SIGN UP">
          <!-- <a href="#">forget password</a> -->
          </form>
        </div>
      </div>


  </div>

  <script
  src="https://code.jquery.com/jquery-3.3.1.min.js"
  integrity="sha256-FgpCb/KJQlLNfOu91ta32o/NMZxltwRo8QtmkMRdAu8="
  crossorigin="anonymous"></script>

  <script src="js/main.js"></script>

</body>

</html>
